document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-size:32px;font-weight:400;font-style:italic;color:#7A6A5A;\"> — West Sumatra<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;flex:1;\">\n      <div style=\"display:flex;flex-direction:column;gap:8px;\">\n        <div style=\"background:#1C3626;padding:12px 16px;border-radius:4px;\"><div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#E8B84B;letter-spacing:2px;text-transform:uppercase;\">Orientation<\u002Fdiv><\u002Fdiv>\n        <details style=\"flex:1;background:#F0E4CC;padding:16px;border-radius:4px;display:block;\">\n          <summary style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:8px;list-style:none;cursor:pointer;\">\n            <div style=\"flex:1;font-family:var(--ff-b);font-size:24px;color:#3A2A1A;line-height:1.5;\">Malin Kundang, a <strong>poor young man<\u002Fstrong> from West Sumatra, lived with his mother who <strong>loved him dearly<\u002Fstrong>.<\u002Fdiv>\n            <span style=\"display:inline-flex;flex-direction:column;width:22px;height:14px;border-radius:2px;overflow:hidden;border:1px solid rgba(28,54,38,0.2);flex-shrink:0;margin-top:3px;\"><span style=\"display:block;height:7px;background:#CC0001;\"><\u002Fspan><span style=\"display:block;height:7px;background:#F0F0F0;\"><\u002Fspan><\u002Fspan>\n          <\u002Fsummary>\n          <div style=\"font-family:var(--ff-b);font-size:24px;color:#5A4A3A;font-style:italic;padding:6px 0 0;line-height:1.5;\">Malin Kundang, seorang pemuda miskin dari Sumatera Barat, tinggal bersama ibunya yang sangat menyayanginya.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px;\">\n        <div style=\"background:#2E5E3E;padding:12px 16px;border-radius:4px;\"><div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#E8B84B;letter-spacing:2px;text-transform:uppercase;\">Complication<\u002Fdiv><\u002Fdiv>\n rgin-bottom:8px;letter-spacing:2px;text-transform:uppercase;\">Basic Structure<\u002Fdiv>\n          <div style=\"font-family:var(--ff-d);font-size:28px;color:#FAF4E8;line-height:1.4;\">Determiner + Adjective(s) + Noun<\u002Fdiv>\n        <\u002Fdiv>\n        <details><summary style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;list-style:none;cursor:pointer;\"><div style=\"flex:1;font-family:var(--ff-b);font-size:24px;color:#4A3A2A;line-height:1.5;\">Noun phrases create <strong>vivid descriptions<\u002Fstrong> that help readers visualise characters, places, and objects in the story.<\u002Fdiv><span style=\"display:inline-flex;flex-direction:column;width:22px;height:14px;border-radius:2px;overflow:hidden;border:1px solid rgba(28,54,38,0.2);flex-shrink:0;margin-top:3px;\"><span style=\"display:block;height:7px;background:#CC0001;\"><\u002Fspan><span style=\"display:block;height:7px;background:#F0F0F0;\"><\u002Fspan><\u002Fspan><\u002Fsummary><div style=\"font-family:var(--ff-b);font-size:24px;color:#6B5A44;font-style:italic;padding:4px 0 0;line-height:1.5;\">Noun phrase menciptakan deskripsi yang kuat dan membantu pembaca membayangkan tokoh, tempat, dan objek dalam cerita.<\u002Fdiv><\u002Fdetails>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;letter-spacing:2px;text-transform:uppercase;\">Examples from Legends<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n          <div style=\"background:#1C3626;padding:10px 18px;border-radius:40px;font-family:var(--ff-b);font-size:24px;font-weight:600;color:#E8B84B;\">a brave warrior<\u002Fdiv>\n          <div style=\"background:#1C3626;padding:10px 18px;border-radius:40px;font-family:var(--ff-b);font-size:24px;font-weight:600;color:#E8B84B;\">an enchanted lake<\u002Fdiv>\n          <div style=\"background:#1C3626;padding:10px 18px;border-radi ;\"><div style=\"flex:1;font-family:var(--ff-b);font-size:24px;font-style:italic;color:rgba(250,244,232,0.72);line-height:1.45;\">Which moral value from the legends is most relevant to your life today?<\u002Fdiv><span style=\"display:inline-flex;flex-direction:column;width:22px;height:14px;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);flex-shrink:0;margin-top:3px;\"><span style=\"display:block;height:7px;background:#CC0001;\"><\u002Fspan><span style=\"display:block;height:7px;background:#F0F0F0;\"><\u002Fspan><\u002Fspan><\u002Fsummary><div style=\"font-family:var(--ff-b);font-size:24px;color:rgba(250,244,232,0.5);font-style:italic;padding:4px 0 0;line-height:1.45;\">Nilai moral apa dari legenda yang paling relevan dengan kehidupanmu hari ini?<\u002Fdiv><\u002Fdetails>\n      <\u002Fdiv>\n      <div style=\"background:rgba(250,244,232,0.07);border:1px solid rgba(200,148,43,0.25);border-radius:8px;padding:22px 24px;\">\n        <div style=\"font-family:var(--ff-d);font-size:44px;font-weight:700;color:#C8942B;margin-bottom:12px;text-align:center;\">3<\u002Fdiv>\n        <details><summary style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;list-style:none;cursor:pointer;\"><div style=\"flex:1;font-family:var(--ff-b);font-size:24px;font-style:italic;color:rgba(250,244,232,0.72);line-height:1.45;\">What was your biggest challenge, and how did you overcome it?<\u002Fdiv><span style=\"display:inline-flex;flex-direction:column;width:22px;height:14px;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,0.2);flex-shrink:0;margin-top:3px;\"><span style=\"display:block;height:7px;background:#CC0001;\"><\u002Fspan><span style=\"display:block;height:7px;background:#F0F0F0;\"><\u002Fspan><\u002Fspan><\u002Fsummary><div style=\"font-family:var(--ff-b);font-size:24px;color:rgba(250,244,232,0.5);font-style:italic;padding:4px 0 0;line-height:1.45;\">Apa tantangan terbesarmu, dan bagaimana kamu mengatasinya?<\u002Fdiv><\u002Fdetails>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:center;\">\n      <div style=\"font-family:var(--ff-d);font-size:28px;font-style:italic;color:rgba(250,244,232,0.28);\">Advanced English &nbsp;·&nbsp; Unit 1: Legend<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;bottom:24px;right:50px;font-family:var(--ff-b);font-size:24px;font-weight:600;color:rgba(250,244,232,0.18);\">21 / 23<\u002Fdiv>\n<\u002Fsection>\n\n\n<section data-label=\"Tugas Sumatif — Brief\" data-screen-label=\"22 — Tugas Sumatif Brief\" style=\"display:flex;flex-direction:column;background:#FAF4E8;position:relative;overflow:hidden;padding:0;\">\n  <div style=\"height:8px;background:#1C3626;flex-shrink:0;\"><\u002Fdiv>\n  <div style=\"height:3px;background:#C8942B;flex-shrink:0;\"><\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;padding:46px 110px 40px;gap:22px;justify-content:center;\">\n    <div>\n      <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#C8942B;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;\">Tugas Sumatif · Proyek Kelompok<\u002Fdiv>\n      <div style=\"font-family:var(--ff-d);font-size:60px;font-weight:700;color:#1C3626;line-height:1.08;\">Write &amp; Illustrate a Legend<\u002Fdiv>\n      <div style=\"font-family:var(--ff-b);font-size:25px;color:rgba(28,54,38,0.6);margin-top:10px;line-height:1.4;\">Tulis sebuah teks naratif legenda di atas kertas — lengkap dengan ilustrasi, identifikasi struktur, <em>language features<\u002Fem>, dan glosarium — lalu presentasikan di depan kelas.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:20px;\">\n      <div style=\"background:#F0E4CC;border-radius:6px;padding:22px 26px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;margin-bottom:10px;\">Langkah Pengerjaan<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:#1C3626;line-height:1.55;\">\n          1. Bentuk kelompok, lalu pilih satu legenda Nusantara — atau kembangkan versi original kelompokmu.<br>\n          2. Di selembar kertas, tulis ceritanya dan beri <strong>gambar ilustrasi<\u002Fstrong>.<br>\n          3. Identifikasi &amp; beri label <strong>struktur teks<\u002Fstrong>: orientation, complication, resolution, coda.<br>\n          4. <strong>Highlight<\u002Fstrong> bagian <em>language features<\u002Fem>: noun phrase, past tense, action verb, sequence words.<br>\n          5. Buat <strong>glosarium minimal 10 kosakata<\u002Fstrong> yang diambil dari teksmu.<br>\n          6. <strong>Presentasikan<\u002Fstrong> legenda kelompokmu di depan kelas secara <em>storytelling<\u002Fem>.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#1C3626;border-radius:6px;padding:22px 26px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#C8942B;margin-bottom:10px;\">Komponen Karya<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:rgba(250,244,232,0.85);line-height:1.55;\">\n          • Ilustrasi + teks cerita dalam satu lembar<br>\n          • Label struktur teks yang jelas<br>\n          • Language features ter-highlight (warna)<br>\n          • Kotak glosarium (min. 10 kata + arti)<br>\n          • Dikumpulkan untuk dinilai\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;bottom:24px;right:50px;font-family:var(--ff-b);font-size:24px;font-weight:600;color:rgba(28,54,38,0.18);\">22 / 23<\u002Fdiv>\n<\u002Fsection>\n\n\n<section data-label=\"Tugas Sumatif — Rubric\" data-screen-label=\"23 — Tugas Sumatif Rubric\" style=\"display:flex;flex-direction:column;background:#FAF4E8;position:relative;overflow:hidden;padding:0;\">\n  <div style=\"height:8px;background:#1C3626;flex-shrink:0;\"><\u002Fdiv>\n  <div style=\"height:3px;background:#C8942B;flex-shrink:0;\"><\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;padding:52px 110px 44px;gap:20px;justify-content:center;\">\n    <div>\n      <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#C8942B;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;\">Rubrik Penilaian<\u002Fdiv>\n      <div style=\"font-family:var(--ff-d);font-size:60px;font-weight:700;color:#1C3626;line-height:1.1;\">Assessment Criteria<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1;\">\n      <div style=\"background:#F0E4CC;border-radius:6px;padding:18px 20px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;margin-bottom:6px;\">Narrative Content<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:#1C3626;line-height:1.45;\">Cerita legenda utuh dengan orientation, complication, resolution, dan coda.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F0E4CC;border-radius:6px;padding:18px 20px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;margin-bottom:6px;\">Illustration &amp; Layout<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:#1C3626;line-height:1.45;\">Ilustrasi mendukung cerita; tata letak kertas rapi dan menarik.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F0E4CC;border-radius:6px;padding:18px 20px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;margin-bottom:6px;\">Structure Identification<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:#1C3626;line-height:1.45;\">Ketepatan pelabelan tiap bagian struktur teks pada karya.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F0E4CC;border-radius:6px;padding:18px 20px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;margin-bottom:6px;\">Language Features<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:#1C3626;line-height:1.45;\">Highlight noun phrase, past tense, action verb, dan sequence words secara tepat.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F0E4CC;border-radius:6px;padding:18px 20px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;margin-bottom:6px;\">Glossary<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:#1C3626;line-height:1.45;\">Glosarium kata sulit lengkap dengan arti yang benar.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F0E4CC;border-radius:6px;padding:18px 20px;\">\n        <div style=\"font-family:var(--ff-b);font-size:24px;font-weight:700;color:#1C3626;margin-bottom:6px;\">Oral Presentation<\u002Fdiv>\n        <div style=\"font-family:var(--ff-b);font-size:24px;color:#1C3626;line-height:1.45;\">Pelafalan, intonasi, dan ekspresi saat presentasi di depan kelas.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;bottom:24px;right:50px;font-family:var(--ff-b);font-size:24px;font-weight:600;color:rgba(28,54,38,0.18);\">23 / 23<\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fx-import>\n\n\n<button sc-camel-on-click=\"{{ toggleFS }}\" title=\"Toggle fullscreen\" style=\"position:fixed;top:14px;right:18px;z-index:9999;background:rgba(200,148,43,0.88);color:#FAF4E8;border:none;border-radius:6px;padding:8px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,0.3);\">⛶ Fullscreen<\u002Fbutton>\n\n\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      toggleFS: () => {\n        const d = document;\n        const fsEl = d.fullscreenElement || d.webkitFullscreenElement;\n        if (!fsEl) {\n          const el = d.documentElement;\n          const req = el.requestFullscreen || el.webkitRequestFullscreen;\n          if (req) req.call(el);\n        } else {\n          const exit = d.exitFullscreen || d.webkitExitFullscreen;\n          if (exit) exit.call(d);\n        }\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
